name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow one concurrent deployment; queued runs supersede rather than stack.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm target)
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/flame-core/target
          key: cargo-${{ hashFiles('crates/flame-core/Cargo.toml') }}
          restore-keys: cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build WASM
        working-directory: crates/flame-core
        run: wasm-pack build --target web --release --out-dir ../../web/src/wasm

      - name: Install frontend deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: web
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
